name: Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deployment-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run checks
        run: |
          set -euo pipefail
          echo "Checking CI configuration..."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install proxy dependencies
        working-directory: proxy
        run: bun install

      - name: Type-check proxy code
        working-directory: proxy
        run: bun run check

  deploy-llm-proxy:
    name: Deploy LLM Proxy
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure Doppler secrets
        run: |
          echo "${{ secrets.DOPPLER_SERVICE_TOKEN }}" | doppler login --token-only
          doppler setup --project personal --config prod --no-interactive

      - name: Run database migrations
        working-directory: proxy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        run: |
          doppler run -- bash database/setup.sh

      - name: Install proxy dependencies
        working-directory: proxy
        run: bun install

      - name: Deploy to Cloudflare Workers
        working-directory: proxy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        run: |
          doppler run -- wrangler deploy
