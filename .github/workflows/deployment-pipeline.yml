name: Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deployment-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: make install

      - name: Run Python tests
        run: make test

  deploy:
    name: Deploy
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DOPPLER_PROJECT: personal
      DOPPLER_CONFIG: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Add flyctl to PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install deployment utilities
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy LiteLLM to Fly.io
        run: doppler run -- ./scripts/deploy-litellm.sh
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Verify litellm.chrisvouga.dev
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            if curl -fsS "https://litellm.chrisvouga.dev/health/liveliness" >/dev/null 2>&1; then
              echo "https://litellm.chrisvouga.dev is healthy."
              exit 0
            fi
            
            # Check if the error is SSL-related (Error code 525)
            if curl -svS "https://litellm.chrisvouga.dev/health/liveliness" 2>&1 | grep -q "SSL handshake failed\|Error code 525"; then
              echo "Attempt ${attempt}/36: SSL handshake still failing, certificate may be provisioning..."
            else
              echo "Attempt ${attempt}/36: endpoint not healthy yet (non-SSL error), retrying in 5s..."
            fi
            sleep 5
          done
          echo "https://litellm.chrisvouga.dev did not become healthy during verification."
          exit 1
