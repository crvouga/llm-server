name: Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deployment-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install proxy dependencies
        working-directory: proxy
        run: bun install

      - name: Type-check proxy code
        working-directory: proxy
        run: bun run check

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.chrisvouga.dev
          method: jwt
          path: jwt
          role: github-actions
          jwtGithubAudience: https://vault.chrisvouga.dev
          secrets: |
            secret/data/personal/dev DATABASE_URL | DATABASE_URL

      - name: Run proxy usage tracking tests
        working-directory: proxy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: bun test

  deploy-llm-proxy:
    name: Deploy LLM Proxy
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.chrisvouga.dev
          method: jwt
          path: jwt
          role: github-actions
          jwtGithubAudience: https://vault.chrisvouga.dev
          secrets: |
            secret/data/personal/dev CLOUDFLARE_API_TOKEN | CLOUDFLARE_API_TOKEN ;
            secret/data/personal/dev DATABASE_URL | DATABASE_URL

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run database migrations
        working-directory: proxy
        run: bash database/setup.sh

      - name: Install wrangler CLI
        run: npm install -g wrangler

      - name: Install proxy dependencies
        working-directory: proxy
        run: bun install

      - name: Deploy to Cloudflare Workers
        working-directory: proxy
        run: |
          # Wrangler authenticates with CLOUDFLARE_API_TOKEN from Vault.
          printf "%s" "$DATABASE_URL" | wrangler secret put DATABASE_URL
          test -n "$CLOUDFLARE_API_TOKEN" && wrangler deploy
