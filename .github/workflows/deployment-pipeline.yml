name: Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deployment-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install proxy dependencies
        working-directory: proxy
        run: bun install

      - name: Type-check proxy code
        working-directory: proxy
        run: bun run check

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.chrisvouga.dev
          method: jwt
          path: jwt
          role: github-actions
          jwtGithubAudience: https://vault.chrisvouga.dev
          secrets: |
            secret/data/personal/dev DATABASE_URL | DATABASE_URL

      - name: Run proxy usage tracking tests
        working-directory: proxy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: bun test

  deploy-llm-proxy:
    name: Deploy LLM Proxy
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.chrisvouga.dev
          method: jwt
          path: jwt
          role: github-actions
          jwtGithubAudience: https://vault.chrisvouga.dev
          secrets: |
            secret/data/personal/dev CLOUDFLARE_API_TOKEN | CLOUDFLARE_API_TOKEN ;
            secret/data/personal/dev DATABASE_URL | DATABASE_URL

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run database migrations
        working-directory: proxy
        run: bash database/setup.sh

      - name: Install wrangler CLI
        run: npm install -g wrangler

      - name: Install proxy dependencies
        working-directory: proxy
        run: bun install

      - name: Deploy to Cloudflare Workers
        working-directory: proxy
        run: |
          # Wrangler authenticates with CLOUDFLARE_API_TOKEN from Vault.
          printf "%s" "$DATABASE_URL" | wrangler secret put DATABASE_URL
          test -n "$CLOUDFLARE_API_TOKEN" && wrangler deploy

  api-smoke-tests:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-llm-proxy
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.chrisvouga.dev
          method: jwt
          path: jwt
          role: github-actions
          jwtGithubAudience: https://vault.chrisvouga.dev
          secrets: |
            secret/data/personal/dev OPENAI_API_KEY | OPENAI_API_KEY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server_test/requirements.txt

      - name: Install dependencies
        run: pip install -r server_test/requirements.txt

      - name: Wait for deployment to be ready
        timeout-minutes: 5
        run: |
          echo "Waiting 30 seconds for deployment to initialize..."
          sleep 30
          echo "Deployment should be ready now."

      - name: Run API smoke tests
        env:
          LLM_BASE_URL: https://llm-proxy.chrisvouga.dev/v1
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        run: |
          python3 server_test/check_api.py --json-out report.json --markdown-out report.md --smoke-only || true

      - name: Publish workflow summary
        if: always()
        run: |
          if [ -f report.md ]; then
            cat report.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# OpenAI-compatible API check"
              echo ""
              echo "No report was generated — the run may have crashed before checks finished."
              echo ""
              echo "Check the job logs for errors."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-test-report
          path: |
            report.json
            report.md
          if-no-files-found: ignore
          retention-days: 14
