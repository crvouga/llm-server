name: API Check

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: OpenAI-compatible API base URL
        required: false
        default: https://llm-proxy.chrisvouga.dev/v1
      model:
        description: Model id (leave empty to auto-resolve from /v1/models)
        required: false
        default: ""
      skip_tools:
        description: Skip tool-calling tests if the model lacks function support
        type: boolean
        default: false
      run_benchmark:
        description: Run throughput benchmark after smoke tests
        type: boolean
        default: false
      timeout:
        description: Per-request timeout in seconds
        required: false
        default: "120"

jobs:
  api-check:
    name: API check
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.run_benchmark && 25 || 15 }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://secret-store.chrisvouga.dev
          method: jwt
          path: jwt
          role: github-actions
          secrets: |
            secret/data/personal/dev OPENAI_API_KEY | OPENAI_API_KEY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server_test/requirements.txt

      - name: Install dependencies
        run: pip install -r server_test/requirements.txt

      - name: Run API check
        id: run
        env:
          LLM_BASE_URL: ${{ inputs.base_url }}
          LLM_MODEL: ${{ inputs.model }}
          LLM_TIMEOUT: ${{ inputs.timeout }}
        run: |
          set +e
          export OPENAI_API_KEY="${OPENAI_API_KEY:-sk-local}"
          args=(--json-out report.json --markdown-out report.md)
          if [ "${{ inputs.skip_tools }}" = "true" ]; then
            args+=(--skip-tools)
          fi
          if [ "${{ inputs.run_benchmark }}" != "true" ]; then
            args+=(--smoke-only)
          fi
          python3 server_test/check_api.py "${args[@]}"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Publish workflow summary
        if: always()
        run: |
          if [ -f report.md ]; then
            cat report.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# OpenAI-compatible API check"
              echo ""
              echo "No report was generated — the run may have crashed before checks finished."
              echo ""
              echo "Check the job logs for errors."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always() && steps.run.outcome != 'cancelled'
        uses: actions/upload-artifact@v4
        with:
          name: api-check-report
          path: |
            report.json
            report.md
          if-no-files-found: ignore
          retention-days: 14
