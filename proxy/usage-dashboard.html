<!DOCTYPE html>
<!--
  Static reference for the usage dashboard markup.
  Live page is served by the Worker at GET/POST /usage-dashboard (see src/usage-dashboard.ts).
  No client-side JavaScript — submit the form to calculate usage server-side.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Proxy Usage Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0 auto;
        max-width: 960px;
        padding: 1.5rem;
      }
      fieldset {
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 8px;
        margin-bottom: 1rem;
        padding: 1rem;
      }
      legend {
        font-weight: 600;
      }
      label {
        display: block;
        margin-bottom: 0.75rem;
      }
      input[type='date'],
      input[type='number'] {
        margin-left: 0.5rem;
      }
      .muted {
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <h1>LLM Proxy Usage Dashboard</h1>
    <p class="muted">
      Open <code>/usage-dashboard</code> on the deployed Worker for live data. Per-model rows
      are populated from logged requests.
    </p>

    <form method="post" action="/usage-dashboard">
      <fieldset>
        <legend>Date range</legend>
        <label>
          Start
          <input type="date" name="start_date" required />
        </label>
        <label>
          End
          <input type="date" name="end_date" required />
        </label>
      </fieldset>

      <fieldset>
        <legend>Default cloud rates (USD per token)</legend>
        <label>
          Input
          <input
            type="number"
            name="default_input_cost"
            value="0.000001"
            min="0"
            step="0.0000001"
            required
          />
        </label>
        <label>
          Output
          <input
            type="number"
            name="default_output_cost"
            value="0.000002"
            min="0"
            step="0.0000001"
            required
          />
        </label>
        <p class="muted">Defaults: $1.00 / 1M input tokens, $2.00 / 1M output tokens.</p>
      </fieldset>

      <button type="submit">Calculate usage</button>
    </form>
  </body>
</html>
