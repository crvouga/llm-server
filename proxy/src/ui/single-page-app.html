<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            colors: {
              surface: { DEFAULT: '#ffffff', dark: '#111827' },
            },
          },
        },
      };
    </script>
    <style>
      .markdown-body > :first-child {
        margin-top: 0;
      }
      .markdown-body > :last-child {
        margin-bottom: 0;
      }
      .markdown-body p,
      .markdown-body ul,
      .markdown-body ol,
      .markdown-body blockquote,
      .markdown-body pre {
        margin: 0 0 0.85rem;
      }
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4 {
        margin: 1.25rem 0 0.65rem;
        line-height: 1.3;
        font-weight: 700;
      }
      .markdown-body h1 {
        font-size: 1.35rem;
      }
      .markdown-body h2 {
        font-size: 1.2rem;
      }
      .markdown-body h3 {
        font-size: 1.05rem;
      }
      .markdown-body ul,
      .markdown-body ol {
        padding-left: 1.4rem;
      }
      .markdown-body pre {
        overflow-x: auto;
        padding: 0;
        border-radius: 8px;
        border: 1px solid rgba(128, 128, 128, 0.25);
        margin: 0 0 0.85rem;
        background: #0d1117;
      }
      .markdown-body pre code,
      .markdown-body pre code.hljs {
        display: block;
        padding: 0.85rem 1rem;
        overflow-x: auto;
        background: transparent;
        font-size: 0.85em;

      }
      .markdown-body :not(pre) > code {

        font-size: 0.85em;

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

      media="(prefers-color-scheme: light)"

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css"
      media="(prefers-color-scheme: dark)"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>

  <body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback, useMemo } = React;
      const markedLib = typeof window !== 'undefined' && window.marked ? window.marked : null;
      let markedConfigured = false;

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      const LANGUAGE_ALIASES = {
        js: 'javascript',
        jsx: 'javascript',
        mjs: 'javascript',
        cjs: 'javascript',
        ts: 'typescript',
        tsx: 'typescript',
        py: 'python',
        sh: 'bash',
        shell: 'bash',
        zsh: 'bash',
        yml: 'yaml',
        md: 'markdown',
        'c++': 'cpp',
        'c#': 'csharp',
        cs: 'csharp',
        golang: 'go',
        rs: 'rust',
        html: 'xml',
        svg: 'xml',
        htm: 'xml',
      };

      function normalizeLanguage(lang) {
        if (!lang || typeof lang !== 'string') return '';
        const normalized = lang.trim().toLowerCase();
        return LANGUAGE_ALIASES[normalized] || normalized;
      }

      function highlightCode(text, lang) {
        const hljs = typeof window !== 'undefined' ? window.hljs : null;
        if (!hljs) return { html: escapeHtml(text), language: 'plaintext' };

        const language = normalizeLanguage(lang);
        try {
          if (language && hljs.getLanguage(language)) {
            return {
              html: hljs.highlight(text, { language, ignoreIllegals: true }).value,
              language,
            };
          }
          const auto = hljs.highlightAuto(text, [
            'javascript',
            'typescript',
            'python',
            'bash',
            'json',
            'css',
            'xml',
            'markdown',
            'rust',
            'go',
            'java',
            'csharp',
            'cpp',
            'sql',
            'yaml',
            'php',
            'ruby',
            'kotlin',
            'swift',
          ]);
          return { html: auto.value, language: auto.language || 'plaintext' };
        } catch {
          return { html: escapeHtml(text), language: 'plaintext' };
        }
      }

      function configureMarked() {
        if (!markedLib || markedConfigured) return;
        markedLib.use({
          breaks: true,
          gfm: true,
          renderer: {
            code({ text, lang }) {
              const { html, language } = highlightCode(text, lang);
              return `<pre><code class="hljs language-${language}">${html}</code></pre>`;
            },
          },
        });
        markedConfigured = true;
      }

      function renderMarkdown(content) {
        if (!content.trim()) return '';
        if (markedLib) {
          configureMarked();
          return markedLib.parse(content, { async: false });
        }
        return escapeHtml(content).replace(/\n/g, '<br>');
      }

      const TAB_DASHBOARD = 'dashboard';
      const TAB_CHAT = 'chat';
      const TAB_QUERY_PARAM = 'tab';
      const DASHBOARD_DATA_API_PATH = '/api/dashboard-data';
      const MODELS_API_PATH = '/api/models';
      const COST_RATES_PATH = '/ui/cost-rates';
      const CHAT_COMPLETIONS_PATH = '/v1/chat/completions';
      const DEFAULT_INPUT_COST = 1;
      const DEFAULT_OUTPUT_COST = 2;
      const DATE_BUCKETS = [
        { id: 'today', label: 'Today' },
        { id: 'this_week', label: 'This week' },
        { id: 'this_month', label: 'This month' },
        { id: 'this_year', label: 'This year' },
        { id: 'all_time', label: 'All time' },
      ];
      const DATE_BUCKET_LABELS = {
        today: 'Today',
        this_week: 'This week',
        this_month: 'This month',
        this_year: 'This year',
        all_time: 'All time',
      };
      const TABLE_COLUMNS = [
        { key: 'model', label: 'Model', numeric: false },
        { key: 'requestCount', label: 'Requests', numeric: true },
        { key: 'promptTokens', label: 'Prompt', numeric: true },
        { key: 'completionTokens', label: 'Completion', numeric: true },
        { key: 'totalTokens', label: 'Total', numeric: true },
        { key: 'avgTokensPerRequest', label: 'Avg / req', numeric: true },
        { key: 'avgTokensPerSecond', label: 'Avg tok/s', numeric: true },
        { key: 'avgOverallTps', label: 'Overall tok/s', numeric: true },
        { key: 'avgGenerationTps', label: 'Gen tok/s', numeric: true },
        { key: 'percentOfTotal', label: '% of total', numeric: true },
        { key: 'estCostUsd', label: 'Est. cost', numeric: true },
      ];
      const DASHBOARD_FORM_ID = 'dashboard-form';

      function formatUsd(amount) {
        return new Intl.NumberFormat('en-US', {
          style: 'currency',
          currency: 'USD',
          minimumFractionDigits: 2,
          maximumFractionDigits: 4,
        }).format(amount);
      }

      function formatInt(value) {
        return new Intl.NumberFormat('en-US').format(value);
      }

      function formatTps(value) {
        if (value === null || !Number.isFinite(value)) return '—';
        return new Intl.NumberFormat('en-US', {
          minimumFractionDigits: 1,
          maximumFractionDigits: 1,
        }).format(value);
      }

      function formatDurationMs(durationMs) {
        if (!Number.isFinite(durationMs) || durationMs < 0) return '—';
        if (durationMs < 1000) return `${Math.round(durationMs)}ms`;
        return `${(durationMs / 1000).toFixed(1)}s`;
      }

      function computeTokensPerSecond(totalTokens, durationMs) {
        if (
          !Number.isFinite(totalTokens) ||
          !Number.isFinite(durationMs) ||
          totalTokens < 0 ||
          durationMs <= 0
        ) {
          return null;
        }
        return totalTokens / (durationMs / 1000);
      }

      function formatPercent(value) {
        return new Intl.NumberFormat('en-US', {
          style: 'percent',
          minimumFractionDigits: 1,
          maximumFractionDigits: 1,
        }).format(value / 100);
      }

      function formatDateRangeLabel(filters) {
        const bucketLabel = DATE_BUCKET_LABELS[filters.dateBucket] || filters.dateBucket;
        if (filters.startDate === filters.endDate) {
          return `${bucketLabel} · ${filters.startDate}`;
        }
        return `${bucketLabel} · ${filters.startDate} → ${filters.endDate}`;
      }

      function rowRates(filters, model) {
        return filters.modelCosts[model] || filters.defaultRates;
      }

      function buildDashboardSearch(filters, overrides = {}) {
        const dateBucket = overrides.dateBucket ?? filters.dateBucket;
        const sortKey = overrides.sortKey ?? filters.sortKey ?? 'totalTokens';
        const sortDir = overrides.sortDir ?? filters.sortDir ?? 'desc';
        const params = new URLSearchParams();
        params.set(TAB_QUERY_PARAM, TAB_DASHBOARD);
        if (dateBucket !== 'all_time') params.set('range', dateBucket);
        if (sortKey !== 'totalTokens') params.set('sort', sortKey);
        if (sortDir !== 'desc') params.set('dir', sortDir);
        return `?${params.toString()}`;
      }

      const routeListeners = new Set();

      function getTabFromUrl(url = new URL(window.location.href)) {
        const tab = url.searchParams.get(TAB_QUERY_PARAM);
        return tab === TAB_CHAT ? TAB_CHAT : TAB_DASHBOARD;
      }

      function notifyRouteChange() {
        for (const listener of routeListeners) listener();
      }

      function navigateToTab(tab, search = window.location.search) {
        const url = new URL(window.location.href);
        url.pathname = '/ui';
        url.search = search.startsWith('?') ? search : search ? `?${search}` : '';
        url.searchParams.set(TAB_QUERY_PARAM, tab);
        window.history.pushState({ tab }, '', url);
        notifyRouteChange();
      }

      function navigateToSearch(search) {
        const url = new URL(window.location.href);
        url.pathname = '/ui';
        url.search = search.startsWith('?') ? search : `?${search}`;
        if (!url.searchParams.has(TAB_QUERY_PARAM)) {
          url.searchParams.set(TAB_QUERY_PARAM, TAB_DASHBOARD);
        }
        window.history.pushState({}, '', url);
        notifyRouteChange();
      }

      function subscribeToRouteChanges(listener) {
        routeListeners.add(listener);
        window.addEventListener('popstate', listener);
        return () => {
          routeListeners.delete(listener);
          window.removeEventListener('popstate', listener);
        };
      }

      async function fetchDashboardData(search) {
        const query = search.startsWith('?') ? search : search ? `?${search}` : '';
        const response = await fetch(`${DASHBOARD_DATA_API_PATH}${query}`);
        if (!response.ok) {
          let details = `Request failed (${response.status})`;
          try {
            const json = await response.json();
            if (json.error) details = json.error;
          } catch {
            const text = await response.text();
            if (text) details = text;
          }
          throw new Error(details);
        }
        return response.json();
      }

      async function saveCostRates(body) {
        const response = await fetch(COST_RATES_PATH, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!response.ok) throw new Error('Failed to save cost rates');
        return response.json();
      }

      async function fetchAvailableModels() {
        try {
          const response = await fetch(MODELS_API_PATH);
          if (!response.ok) return [];
          const json = await response.json();
          return (json.data || [])
            .map((entry) => entry.id)
            .filter((id) => typeof id === 'string' && id.length > 0);
        } catch {
          return [];
        }
      }

      async function parseErrorResponse(response) {
        try {
          const json = await response.json();
          return json.error?.message || `Request failed (${response.status})`;
        } catch {
          const text = await response.text();
          return text || `Request failed (${response.status})`;
        }
      }

      async function readSseStream(reader, onDelta) {
        const decoder = new TextDecoder();
        let buffer = '';
        let full = '';
        let usage = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) return { content: full, usage };
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() ?? '';
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data:')) continue;
            const data = trimmed.slice(5).trim();
            if (!data || data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              const delta = parsed.choices?.[0]?.delta?.content;
              if (typeof delta === 'string' && delta.length > 0) {
                full += delta;
                onDelta(full);
              }
              if (parsed.usage && typeof parsed.usage === 'object') {
                usage = parsed.usage;
              }
            } catch {
              /* ignore malformed SSE */
            }
          }
        }
      }

      function normalizeChatUsage(usage) {
        if (!usage || typeof usage !== 'object') return null;
        const promptTokens = Number(usage.prompt_tokens);
        const completionTokens = Number(usage.completion_tokens);
        if (!Number.isFinite(promptTokens) || !Number.isFinite(completionTokens)) return null;
        return { promptTokens, completionTokens };
      }

      async function streamChatCompletion(messages, model, onDelta, signal) {
        const startedAt = performance.now();
        const response = await fetch(CHAT_COMPLETIONS_PATH, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages, stream: true }),
          signal,
        });

        if (!response.ok) {
          throw new Error(await parseErrorResponse(response));
        }

        const contentType = response.headers.get('content-type') || '';
        if (!contentType.includes('text/event-stream') || !response.body) {
          const json = await response.json();
          const content = json.choices?.[0]?.message?.content ?? '';
          onDelta(content);
          const durationMs = performance.now() - startedAt;
          const usage = normalizeChatUsage(json.usage);
          return {
            content,
            durationMs,
            promptTokens: usage?.promptTokens ?? null,
            completionTokens: usage?.completionTokens ?? null,
          };
        }

        const result = await readSseStream(response.body.getReader(), onDelta);
        const durationMs = performance.now() - startedAt;
        const usage = normalizeChatUsage(result.usage);
        return {
          content: result.content,
          durationMs,
          promptTokens: usage?.promptTokens ?? null,
          completionTokens: usage?.completionTokens ?? null,
        };
      }

      function Spinner({ size = 'md' }) {
        const cls = size === 'sm' ? 'spinner spinner-sm' : size === 'lg' ? 'spinner spinner-lg' : 'spinner';
        return <span className={cls} aria-hidden="true" />;
      }

      function TabBar({ activeTab }) {
        function onTabClick(event, tab) {
          event.preventDefault();
          if (tab === activeTab) return;
          navigateToTab(tab);
        }

        const tabClass = (tab) =>
          `inline-flex items-center rounded-full border px-3.5 py-2 text-sm font-semibold transition ${
            activeTab === tab
              ? 'border-blue-500 bg-blue-50 text-blue-600 dark:border-emerald-500 dark:bg-emerald-950 dark:text-emerald-400'
              : 'border-transparent text-slate-500 hover:border-slate-300 hover:bg-slate-100 dark:text-slate-400 dark:hover:border-slate-600 dark:hover:bg-slate-900'
          }`;

        return (
          <nav className="flex flex-wrap items-center justify-center gap-1.5" aria-label="Sections">
            <a href="?tab=dashboard" className={tabClass(TAB_DASHBOARD)} onClick={(e) => onTabClick(e, TAB_DASHBOARD)}>
              Dashboard
            </a>
            <a href="?tab=chat" className={tabClass(TAB_CHAT)} onClick={(e) => onTabClick(e, TAB_CHAT)}>
              Chat
            </a>
          </nav>
        );
      }

      function AppTopBar({ activeTab, onRefresh, refreshing }) {
        return (
          <header className="sticky top-0 z-50 border-b border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div className="mx-auto grid max-w-7xl grid-cols-1 items-center gap-3 px-4 py-3 md:grid-cols-[auto_1fr_auto] md:px-6">
              <h1 className="text-lg font-bold tracking-tight">LLM Proxy</h1>
              <TabBar activeTab={activeTab} />
              {activeTab === TAB_DASHBOARD && onRefresh ? (
                <button
                  type="button"
                  className="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3.5 py-2 text-sm font-semibold transition hover:border-blue-500 hover:bg-blue-50 hover:text-blue-600 disabled:cursor-not-allowed disabled:opacity-70 dark:border-slate-700 dark:bg-slate-950 dark:hover:border-blue-400 dark:hover:bg-slate-800"
                  disabled={refreshing}
                  onClick={onRefresh}
                >
                  {refreshing ? <Spinner size="sm" /> : null}
                  {refreshing ? 'Refreshing…' : 'Refresh'}
                </button>
              ) : (
                <span className="hidden w-24 md:block" aria-hidden="true" />
              )}
            </div>
          </header>
        );
      }

      function SummaryCards({ summary, filters }) {
        return (
          <>
            <div className="mb-3 grid min-w-0 w-full grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
              <div className="min-w-0 w-full rounded-xl border border-blue-200 bg-gradient-to-br from-blue-50 to-white p-5 shadow-md dark:border-blue-900 dark:from-blue-950 dark:to-slate-900 md:col-span-2 xl:col-span-4">
                <div className="text-xs font-semibold uppercase tracking-wide text-blue-600 dark:text-blue-400">
                  Est. cloud cost
                </div>
                <div className="mt-1 text-4xl font-extrabold text-blue-600 dark:text-blue-400">
                  {formatUsd(summary.totals.estCostUsd)}
                </div>
                <div className="mt-2 text-sm text-slate-500 dark:text-slate-400">
                  What this proxy would have cost on cloud — local inference assumed free
                </div>
              </div>
              <div className="min-w-0 w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                <div className="text-xs font-semibold uppercase tracking-wide text-slate-500">Total requests</div>
                <div className="mt-1 text-2xl font-bold tabular-nums">{formatInt(summary.totals.requestCount)}</div>
              </div>
              <div className="min-w-0 w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                <div className="text-xs font-semibold uppercase tracking-wide text-slate-500">Total tokens</div>
                <div className="mt-1 text-2xl font-bold tabular-nums">{formatInt(summary.totals.totalTokens)}</div>
                <div className="mt-1 text-sm text-slate-500">
                  {formatInt(summary.totals.promptTokens)} prompt · {formatInt(summary.totals.completionTokens)} completion
                </div>
              </div>
              <div className="min-w-0 w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                <div className="text-xs font-semibold uppercase tracking-wide text-slate-500">Models queried</div>
                <div className="mt-1 text-2xl font-bold tabular-nums">{formatInt(summary.totals.modelCount)}</div>
              </div>
            </div>
            <div className="mb-6">
              <span className="inline-block rounded-full bg-blue-50 px-3 py-1 text-sm font-semibold text-blue-600 dark:bg-blue-950 dark:text-blue-400">
                {formatDateRangeLabel(filters)}
              </span>
            </div>
          </>
        );
      }

      function Charts({ data }) {
        const chartsContainerRef = useRef(null);

        useEffect(() => {
          if (!data || (data.labels.length === 0 && data.dailyLabels.length === 0)) return;

          const textColor = '#64748b';
          const gridColor = 'rgba(128,128,128,0.15)';
          const isMobile = window.innerWidth < 768;
          const charts = [];
          let resizeObserver = null;
          let resizeFrame = null;

          function scheduleChartResize() {
            if (resizeFrame) cancelAnimationFrame(resizeFrame);
            resizeFrame = requestAnimationFrame(() => {
              for (const chart of charts) chart.resize();
            });
          }
          function truncateLabel(label, maxLen = isMobile ? 14 : 32) {
            const text = String(label);
            return text.length > maxLen ? `${text.slice(0, maxLen - 1)}…` : text;
          }

          const baseOpts = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: textColor, font: { size: isMobile ? 10 : 11 } } } },
            scales: {
              x: {
                ticks: {
                  color: textColor,
                  font: { size: isMobile ? 9 : 10 },
                  maxRotation: isMobile ? 45 : 0,
                  autoSkip: true,
                  maxTicksLimit: isMobile ? 8 : undefined,
                  callback(value) {
                    return truncateLabel(this.getLabelForValue(value));
                  },
                },
                grid: { color: gridColor },
              },
              y: {
                ticks: {
                  color: textColor,
                  font: { size: isMobile ? 9 : 10 },
                  callback(value) {
                    return truncateLabel(this.getLabelForValue(value));
                  },
                },
                grid: { color: gridColor },
              },
            },
          };

          if (data.labels.length > 0) {
            const tokensEl = document.getElementById('chart-tokens-per-model');
            if (tokensEl) {
              charts.push(
                new Chart(tokensEl, {
                  type: 'bar',
                  data: {
                    labels: data.labels,
                    datasets: [{ label: 'Total tokens', data: data.totalTokens, backgroundColor: data.colors, borderRadius: 4 }],
                  },
                  options: { ...baseOpts, indexAxis: 'y', plugins: { legend: { display: false } } },
                }),
              );
            }

            const stackedEl = document.getElementById('chart-stacked-tokens');
            if (stackedEl) {
              charts.push(
                new Chart(stackedEl, {
                  type: 'bar',
                  data: {
                    labels: data.labels,
                    datasets: [
                      { label: 'Prompt', data: data.promptTokens, backgroundColor: '#3b82f6', borderRadius: 2 },
                      { label: 'Completion', data: data.completionTokens, backgroundColor: '#8b5cf6', borderRadius: 2 },
                    ],
                  },
                  options: {
                    ...baseOpts,
                    scales: {
                      x: { ...baseOpts.scales.x, stacked: true },
                      y: { ...baseOpts.scales.y, stacked: true },
                    },
                  },
                }),
              );
            }

            const shareEl = document.getElementById('chart-share');
            if (shareEl) {
              charts.push(
                new Chart(shareEl, {
                  type: 'doughnut',
                  data: {
                    labels: data.labels,
                    datasets: [{ data: data.totalTokens, backgroundColor: data.colors, borderWidth: 0 }],
                  },
                  options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                      legend: {
                        position: isMobile ? 'bottom' : 'right',
                        labels: { color: textColor, font: { size: isMobile ? 10 : 11 }, boxWidth: 12 },
                      },
                    },
                  },
                }),
              );
            }

            const costEl = document.getElementById('chart-cost');
            if (costEl) {
              charts.push(
                new Chart(costEl, {
                  type: 'bar',
                  data: {
                    labels: data.labels,
                    datasets: [{ label: 'Est. cost (USD)', data: data.estCostUsd, backgroundColor: '#10b981', borderRadius: 4 }],
                  },
                  options: {
                    ...baseOpts,
                    plugins: { legend: { display: false } },
                    scales: {
                      x: baseOpts.scales.x,
                      y: {
                        ...baseOpts.scales.y,
                        ticks: {
                          ...baseOpts.scales.y.ticks,
                          callback: (v) => '$' + Number(v).toFixed(4),
                        },
                      },
                    },
                  },
                }),
              );
            }
          }

          if (data.dailyLabels.length > 0) {
            const dailyEl = document.getElementById('chart-daily');
            if (dailyEl) {
              charts.push(
                new Chart(dailyEl, {
                  type: 'line',
                  data: {
                    labels: data.dailyLabels,
                    datasets: [
                      { label: 'Prompt', data: data.dailyPrompt, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3, pointRadius: 2 },
                      { label: 'Completion', data: data.dailyCompletion, borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,0.1)', fill: true, tension: 0.3, pointRadius: 2 },
                      { label: 'Total', data: data.dailyTotal, borderColor: '#10b981', backgroundColor: 'transparent', borderDash: [4, 4], tension: 0.3, pointRadius: 0 },
                    ],
                  },
                  options: baseOpts,
                }),
              );
            }
          }

          scheduleChartResize();

          const container = chartsContainerRef.current;
          if (container && typeof ResizeObserver !== 'undefined') {
            resizeObserver = new ResizeObserver(() => scheduleChartResize());
            resizeObserver.observe(container);
          } else {
            window.addEventListener('resize', scheduleChartResize);
          }

          return () => {
            if (resizeFrame) cancelAnimationFrame(resizeFrame);
            if (resizeObserver) resizeObserver.disconnect();
            else window.removeEventListener('resize', scheduleChartResize);
            for (const chart of charts) chart.destroy();
          };
        }, [data]);

        if (!data || (data.labels.length === 0 && data.dailyLabels.length === 0)) return null;

        return (
          <div ref={chartsContainerRef} className="mb-6 grid min-w-0 w-full max-w-full grid-cols-1 gap-6 md:grid-cols-2">
            {data.labels.length > 0 ? (
              <>
                <div className="min-w-0 w-full max-w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                  <h3 className="mb-4 text-sm font-semibold">Total tokens per model</h3>
                  <div className="chart-wrap tall">
                    <canvas id="chart-tokens-per-model" />
                  </div>
                </div>
                <div className="min-w-0 w-full max-w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                  <h3 className="mb-4 text-sm font-semibold">Token share by model</h3>
                  <div className="chart-wrap tall">
                    <canvas id="chart-share" />
                  </div>
                </div>
                <div className="min-w-0 w-full max-w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900 md:col-span-2">
                  <h3 className="mb-4 text-sm font-semibold">Prompt vs completion tokens per model</h3>
                  <div className="chart-wrap">
                    <canvas id="chart-stacked-tokens" />
                  </div>
                </div>
                <div className="min-w-0 w-full max-w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900 md:col-span-2">
                  <h3 className="mb-4 text-sm font-semibold">Estimated cloud cost per model</h3>
                  <div className="chart-wrap">
                    <canvas id="chart-cost" />
                  </div>
                </div>
              </>
            ) : null}
            {data.dailyLabels.length > 0 ? (
              <div className="min-w-0 w-full max-w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900 md:col-span-2">
                <h3 className="mb-4 text-sm font-semibold">Daily token usage over time</h3>
                <div className="chart-wrap">
                  <canvas id="chart-daily" />
                </div>
              </div>
            ) : null}
          </div>
        );
      }

      function cellValue(row, key) {
        if (key === 'model') return row.model;
        if (key === 'avgTokensPerRequest') return Math.round(row.avgTokensPerRequest);
        if (key === 'avgTokensPerSecond') return row.avgTokensPerSecond ?? -1;
        if (key === 'avgOverallTps') return row.avgOverallTps ?? -1;
        if (key === 'avgGenerationTps') return row.avgGenerationTps ?? -1;
        return row[key];
      }

      function formatCell(row, key) {
        if (key === 'model') return row.model;
        if (key === 'percentOfTotal') return formatPercent(row.percentOfTotal);
        if (key === 'estCostUsd') return formatUsd(row.estCostUsd);
        if (key === 'avgTokensPerRequest') return formatInt(Math.round(row.avgTokensPerRequest));
        if (key === 'avgTokensPerSecond') return formatTps(row.avgTokensPerSecond);
        if (key === 'avgOverallTps') return formatTps(row.avgOverallTps);
        if (key === 'avgGenerationTps') return formatTps(row.avgGenerationTps);
        return formatInt(row[key]);
      }

      function SortableTable({ rows, totals, initialSortKey = 'totalTokens', initialSortDir = 'desc' }) {
        const [sortKey, setSortKey] = useState(initialSortKey);
        const [sortDir, setSortDir] = useState(initialSortDir);
        const multiplier = sortDir === 'asc' ? 1 : -1;

        const sortedRows = [...rows].sort((a, b) => {
          const av = cellValue(a, sortKey);
          const bv = cellValue(b, sortKey);
          if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * multiplier;
          return String(av).localeCompare(String(bv)) * multiplier;
        });

        function onHeaderClick(key) {
          let nextDir;
          if (sortKey === key) nextDir = sortDir === 'asc' ? 'desc' : 'asc';
          else nextDir = 'desc';
          setSortKey(key);
          setSortDir(nextDir);
          const url = new URL(window.location.href);
          if (key === 'totalTokens') url.searchParams.delete('sort');
          else url.searchParams.set('sort', key);
          if (nextDir === 'desc') url.searchParams.delete('dir');
          else url.searchParams.set('dir', nextDir);
          history.replaceState(null, '', url);
        }

        return (
          <div className="min-w-0 w-full max-w-full overflow-x-auto">
            <table className="w-full min-w-[640px] text-sm">
              <thead>
                <tr className="border-b border-slate-200 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:border-slate-700">
                  {TABLE_COLUMNS.map((col) => (
                    <th
                      key={col.key}
                      className={`cursor-pointer px-3 py-2 hover:text-slate-900 dark:hover:text-slate-200 ${col.numeric ? 'text-right' : ''}`}
                      onClick={() => onHeaderClick(col.key)}
                    >
                      {col.label}
                      {sortKey === col.key ? (sortDir === 'asc' ? ' ↑' : ' ↓') : ''}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sortedRows.map((row) => (
                  <tr key={row.model} className="border-b border-slate-100 dark:border-slate-800">
                    {TABLE_COLUMNS.map((col) => (
                      <td key={col.key} className={`px-3 py-2 ${col.numeric ? 'text-right tabular-nums' : ''}`}>
                        {col.key === 'model' ? (
                          <code className="rounded bg-blue-50 px-1.5 py-0.5 text-xs dark:bg-blue-950">{row.model}</code>
                        ) : (
                          formatCell(row, col.key)
                        )}
                      </td>
                    ))}
                  </tr>
                ))}
                <tr className="border-t-2 border-slate-300 font-semibold dark:border-slate-600">
                  <td className="px-3 py-2">Total</td>
                  <td className="px-3 py-2 text-right tabular-nums">{formatInt(totals.requestCount)}</td>
                  <td className="px-3 py-2 text-right tabular-nums">{formatInt(totals.promptTokens)}</td>
                  <td className="px-3 py-2 text-right tabular-nums">{formatInt(totals.completionTokens)}</td>
                  <td className="px-3 py-2 text-right tabular-nums">{formatInt(totals.totalTokens)}</td>
                  <td className="px-3 py-2 text-right">—</td>
                  <td className="px-3 py-2 text-right tabular-nums">{formatTps(totals.avgTokensPerSecond)}</td>
                  <td className="px-3 py-2 text-right tabular-nums">{formatTps(totals.avgOverallTps)}</td>
                  <td className="px-3 py-2 text-right tabular-nums">{formatTps(totals.avgGenerationTps)}</td>
                  <td className="px-3 py-2 text-right">100%</td>
                  <td className="px-3 py-2 text-right tabular-nums">{formatUsd(totals.estCostUsd)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        );
      }

      function CostRateInput({ name, value }) {
        return (
          <div className="flex items-center gap-1 rounded-full border border-slate-200 bg-slate-50 px-3 py-1 dark:border-slate-700 dark:bg-slate-950">
            <span className="text-sm font-semibold text-slate-500">$</span>
            <input
              type="number"
              className="w-full min-w-0 border-0 bg-transparent text-sm outline-none"
              name={name}
              defaultValue={value}
              min={0}
              step={0.01}
            />
          </div>
        );
      }

      function ModelCostTable({ models, filters }) {
        if (models.length === 0) {
          return <p className="text-sm text-slate-500">No models logged yet. Defaults apply once traffic arrives.</p>;
        }

        return (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-slate-200 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:border-slate-700">
                  <th className="px-3 py-2">Model</th>
                  <th className="px-3 py-2">Input $/1M tokens</th>
                  <th className="px-3 py-2">Output $/1M tokens</th>
                </tr>
              </thead>
              <tbody>
                {models.map((model) => {
                  const rates = rowRates(filters, model);
                  return (
                    <tr key={model} className="border-b border-slate-100 dark:border-slate-800">
                      <td className="px-3 py-2">
                        <code className="rounded bg-blue-50 px-1.5 py-0.5 text-xs dark:bg-blue-950">{model}</code>
                      </td>
                      <td className="px-3 py-2">
                        <CostRateInput name={`input_cost[${model}]`} value={rates.inputPerMillion} />
                      </td>
                      <td className="px-3 py-2">
                        <CostRateInput name={`output_cost[${model}]`} value={rates.outputPerMillion} />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      }

      function FilterForm({ filters, models, savedCostRates, onApply }) {
        const [status, setStatus] = useState('');
        const [statusError, setStatusError] = useState(false);
        const [saving, setSaving] = useState(false);

        function savedRatesLabel() {
          if (!savedCostRates?.updatedAt) {
            return `Using built-in defaults: $${DEFAULT_INPUT_COST.toFixed(2)} input / $${DEFAULT_OUTPUT_COST.toFixed(2)} output per 1M tokens.`;
          }
          const { inputPerMillion, outputPerMillion } = savedCostRates.defaultRates;
          const updated = new Date(savedCostRates.updatedAt).toLocaleString();
          return `Saved rates: $${inputPerMillion.toFixed(2)} input / $${outputPerMillion.toFixed(2)} output per 1M tokens (updated ${updated}).`;
        }

        function onDateBucketClick(event, dateBucket) {
          event.preventDefault();
          const search = buildDashboardSearch(filters, { dateBucket });
          navigateToSearch(search);
          onApply(search);
        }

        function onSaveRates() {
          const form = document.getElementById(DASHBOARD_FORM_ID);
          if (!form) return;
          setSaving(true);
          setStatus('');
          setStatusError(false);

          const formData = new FormData(form);
          const defaultRates = {
            inputPerMillion: Number(formData.get('input_cost')),
            outputPerMillion: Number(formData.get('output_cost')),
          };
          const modelCosts = {};
          for (const [key, value] of formData.entries()) {
            const inputMatch = key.match(/^input_cost\[(.+)\]$/);
            if (inputMatch) {
              modelCosts[inputMatch[1]] = modelCosts[inputMatch[1]] || {};
              modelCosts[inputMatch[1]].inputPerMillion = Number(value);
              continue;
            }
            const outputMatch = key.match(/^output_cost\[(.+)\]$/);
            if (outputMatch) {
              modelCosts[outputMatch[1]] = modelCosts[outputMatch[1]] || {};
              modelCosts[outputMatch[1]].outputPerMillion = Number(value);
            }
          }

          saveCostRates({ defaultRates, modelCosts })
            .then(() => {
              const search = `?${TAB_QUERY_PARAM}=${TAB_DASHBOARD}&saved=1`;
              navigateToSearch(search);
              onApply(search);
            })
            .catch(() => {
              setStatus('Failed to save cost rates. Check database connectivity.');
              setStatusError(true);
            })
            .finally(() => setSaving(false));
        }

        return (
          <div className="min-w-0 w-full max-w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <h2 className="text-lg font-semibold">Filters &amp; cost rates</h2>
            <p className="mt-1 text-sm text-slate-500">
              Est. cost = (prompt tokens × input $/1M + completion tokens × output $/1M) ÷ 1,000,000. Local inference is
              assumed free.
            </p>
            <p className="mt-3 text-sm text-slate-500">{savedRatesLabel()}</p>
            <form id={DASHBOARD_FORM_ID} className="mt-4 space-y-4">
              <input type="hidden" name={TAB_QUERY_PARAM} value={TAB_DASHBOARD} />
              <input type="hidden" name="range" value={filters.dateBucket} />
              {filters.sortKey !== 'totalTokens' ? <input type="hidden" name="sort" value={filters.sortKey} /> : null}
              {filters.sortDir !== 'desc' ? <input type="hidden" name="dir" value={filters.sortDir} /> : null}

              <fieldset className="rounded-lg border border-slate-200 p-4 dark:border-slate-700">
                <legend className="px-1 text-sm font-semibold">Date range</legend>
                <div className="mt-2 flex flex-wrap gap-2">
                  {DATE_BUCKETS.map((bucket) => (
                    <a
                      key={bucket.id}
                      href={buildDashboardSearch(filters, { dateBucket: bucket.id })}
                      className={`rounded-full border px-3 py-1.5 text-sm font-medium transition ${
                        filters.dateBucket === bucket.id
                          ? 'border-blue-500 bg-blue-50 text-blue-600 dark:border-emerald-500 dark:bg-emerald-950 dark:text-emerald-400'
                          : 'border-slate-200 bg-slate-50 text-slate-700 hover:border-blue-300 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-300'
                      }`}
                      onClick={(e) => onDateBucketClick(e, bucket.id)}
                    >
                      {bucket.label}
                    </a>
                  ))}
                </div>
              </fieldset>

              <fieldset className="rounded-lg border border-slate-200 p-4 dark:border-slate-700">
                <legend className="px-1 text-sm font-semibold">Default cloud rates (USD per 1M tokens)</legend>
                <div className="mt-2 grid gap-4 sm:grid-cols-2">
                  <label className="block text-sm">
                    <span className="mb-1 block font-semibold text-slate-500">Input</span>
                    <CostRateInput name="input_cost" value={filters.defaultRates.inputPerMillion} />
                  </label>
                  <label className="block text-sm">
                    <span className="mb-1 block font-semibold text-slate-500">Output</span>
                    <CostRateInput name="output_cost" value={filters.defaultRates.outputPerMillion} />
                  </label>
                </div>
              </fieldset>

              <fieldset className="rounded-lg border border-slate-200 p-4 dark:border-slate-700">
                <legend className="px-1 text-sm font-semibold">Per-model rate overrides</legend>
                <div className="mt-2">
                  <ModelCostTable models={models} filters={filters} />
                </div>
              </fieldset>

              <div className="flex flex-wrap items-center gap-3">
                <button
                  type="button"
                  className="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-70 dark:bg-emerald-600"
                  disabled={saving}
                  onClick={() => void onSaveRates()}
                >
                  {saving ? <Spinner size="sm" /> : null}
                  {saving ? 'Saving…' : 'Save rates'}
                </button>
                <p className="text-sm text-slate-500">
                  Save persists rates to the database for all clients. Refresh applies unsaved edits for this session only.
                </p>
                {status ? (
                  <p className={`w-full text-sm ${statusError ? 'font-semibold text-red-500' : 'text-slate-500'}`} role="status">
                    {status}
                  </p>
                ) : null}
              </div>
            </form>
          </div>
        );
      }

      function applyDashboardFormToUrl() {
        const form = document.getElementById(DASHBOARD_FORM_ID);
        if (!form) return window.location.search;
        const params = new URLSearchParams();
        for (const [key, value] of new FormData(form).entries()) {
          if (typeof value === 'string') params.append(key, value);
        }
        params.set(TAB_QUERY_PARAM, TAB_DASHBOARD);
        const search = `?${params.toString()}`;
        navigateToSearch(search);
        return search;
      }

      function DashboardView({ onReady, onLoadingChange }) {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [data, setData] = useState(null);

        const load = useCallback((search = window.location.search) => {
          setLoading(true);
          setError(null);
          fetchDashboardData(search)
            .then((result) => {
              setData(result);
              if (result.error) setError(result.error);
            })
            .catch((loadError) => {
              setData(null);
              setError(loadError instanceof Error ? loadError.message : String(loadError));
            })
            .finally(() => setLoading(false));
        }, []);

        useEffect(() => {
          load();
          return subscribeToRouteChanges(() => {
            if (getTabFromUrl() === TAB_DASHBOARD) load();
          });
        }, [load]);

        const onRefresh = useCallback(() => {
          const search = applyDashboardFormToUrl();
          load(search);
        }, [load]);

        useEffect(() => {
          onReady?.({ refresh: onRefresh });
        }, [onReady, onRefresh]);

        useEffect(() => {
          onLoadingChange?.(loading);
        }, [loading, onLoadingChange]);

        const flashMessage =
          new URL(window.location.href).searchParams.get('saved') === '1'
            ? 'Cost rates saved and shared across clients.'
            : null;
        const hasData = data?.summary !== null && (data?.summary?.rows.length ?? 0) > 0;
        const isInitialLoad = loading && data === null;

        return (
          <div className="dashboard-shell mx-auto w-full max-w-7xl flex-1 overflow-y-auto px-4 py-6 md:px-6">
            {isInitialLoad ? (
              <div className="flex min-h-64 items-center justify-center py-12" aria-busy="true">
                <Spinner size="lg" />
              </div>
            ) : null}
            {error ? (
              <p className="mb-4 rounded-lg bg-red-50 px-4 py-3 font-semibold text-red-600 dark:bg-red-950 dark:text-red-400">
                {error}
              </p>
            ) : null}
            {flashMessage ? (
              <p className="mb-4 rounded-lg bg-emerald-50 px-4 py-3 font-semibold text-emerald-700 dark:bg-emerald-950 dark:text-emerald-400">
                {flashMessage}
              </p>
            ) : null}

            {!isInitialLoad && data?.summary ? (
              <>
                <SummaryCards summary={data.summary} filters={data.filters} />
                {hasData && data.payload ? (
                  <>
                    <Charts data={data.payload} />
                    <div className="mb-6 min-w-0 max-w-full rounded-xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                      <h2 className="text-lg font-semibold">Per-model breakdown</h2>
                      <p className="mt-1 text-sm text-slate-500">Click column headers to sort. Default order: total tokens descending.</p>
                      <div className="mt-4">
                        <SortableTable
                          rows={data.payload.rows}
                          totals={data.payload.totals}
                          initialSortKey={data.payload.sortKey}
                          initialSortDir={data.payload.sortDir}
                        />
                      </div>
                    </div>
                  </>
                ) : (
                  <p className="text-sm text-slate-500">No chat completion usage found for this date range.</p>
                )}
              </>
            ) : null}

            {!isInitialLoad && data ? (
              <FilterForm
                filters={data.filters}
                models={data.models}
                savedCostRates={data.savedCostRates}
                onApply={load}
              />
            ) : null}
          </div>
        );
      }

      function MarkdownContent({ content }) {
        const html = useMemo(() => renderMarkdown(content), [content]);
        if (!html) return null;
        return <div className="markdown-body text-[0.95rem] leading-7" dangerouslySetInnerHTML={{ __html: html }} />;
      }

      function MessageMetrics({ message }) {
        const { model, promptTokens, completionTokens, durationMs } = message;
        if (
          promptTokens === null ||
          promptTokens === undefined ||
          completionTokens === null ||
          completionTokens === undefined ||
          durationMs === null ||
          durationMs === undefined
        ) {
          return null;
        }

        const totalTokens = promptTokens + completionTokens;
        const tokensPerSecond = computeTokensPerSecond(totalTokens, durationMs);

        return (
          <div className="mt-3 flex flex-wrap items-center gap-x-3 gap-y-1 border-t border-slate-200/70 pt-3 text-xs text-slate-500 dark:border-slate-700/70 dark:text-slate-400">
            {model ? (
              <>
                <code className="rounded bg-slate-100 px-1.5 py-0.5 font-mono text-[0.8rem] text-slate-600 dark:bg-slate-800 dark:text-slate-300">
                  {model}
                </code>
                <span aria-hidden="true">·</span>
              </>
            ) : null}
            <span className="tabular-nums">{formatInt(promptTokens)} prompt</span>
            <span aria-hidden="true">·</span>
            <span className="tabular-nums">{formatInt(completionTokens)} completion</span>
            <span aria-hidden="true">·</span>
            <span className="tabular-nums">{formatDurationMs(durationMs)}</span>
            <span aria-hidden="true">·</span>
            <span className="tabular-nums font-medium text-slate-600 dark:text-slate-300">
              {formatTps(tokensPerSecond)} tok/s
            </span>
          </div>
        );
      }

      function resizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = `${Math.min(textarea.scrollHeight, 160)}px`;
      }

      function ChatView() {
        const messagesRef = useRef(null);
        const textareaRef = useRef(null);
        const abortControllerRef = useRef(null);
        const STORAGE_KEY_MESSAGES = 'llm-chat-messages';
        const STORAGE_KEY_MODEL = 'llm-chat-model';

        const [messages, setMessages] = useState(() => {
          try {
            const saved = localStorage.getItem(STORAGE_KEY_MESSAGES);
            return saved ? JSON.parse(saved) : [];
          } catch {
            return [];
          }
        });
        const [input, setInput] = useState('');
        const [model, setModel] = useState(() => {
          try {
            return localStorage.getItem(STORAGE_KEY_MODEL) || '';
          } catch {
            return '';
          }
        });
        const [models, setModels] = useState([]);
        const [loading, setLoading] = useState(false);
        const [loadingModels, setLoadingModels] = useState(true);
        const [error, setError] = useState(null);

        useEffect(() => {
          localStorage.setItem(STORAGE_KEY_MESSAGES, JSON.stringify(messages));
        }, [messages]);

        useEffect(() => {
          if (model) localStorage.setItem(STORAGE_KEY_MODEL, model);
        }, [model]);

        useEffect(() => {
          let cancelled = false;
          fetchAvailableModels().then((availableModels) => {
            if (cancelled) return;
            setModels(availableModels);
            if (availableModels.length > 0 && !model) {
              setModel(availableModels[0]);
            }
            setLoadingModels(false);
          }).catch(() => {
            if (!cancelled) setLoadingModels(false);
          });
          return () => {
            cancelled = true;
          };
        }, []);

        useEffect(() => {
          const container = messagesRef.current;
          if (container) container.scrollTop = container.scrollHeight;
        }, [messages, loading]);

        useEffect(() => {
          if (textareaRef.current) resizeTextarea(textareaRef.current);
        }, [input]);

        function sendMessage() {
          const content = input.trim();
          if (!content || loading) return;
          if (!model.trim()) {
            setError('Choose a model before sending a message.');
            return;
          }
          if (abortControllerRef.current) abortControllerRef.current.abort();
          abortControllerRef.current = new AbortController();

          const nextMessages = [...messages, { role: 'user', content }];
          setMessages(nextMessages);
          setInput('');
          setLoading(true);
          setError(null);

          const assistantIndex = nextMessages.length;
          const modelUsed = model.trim();
          setMessages([...nextMessages, { role: 'assistant', content: '' }]);

          streamChatCompletion(
            nextMessages,
            modelUsed,
            (assistantContent) => {
              setMessages((current) => {
                const updated = [...current];
                updated[assistantIndex] = { ...updated[assistantIndex], role: 'assistant', content: assistantContent };
                return updated;
              });
            },
            abortControllerRef.current.signal,
          )
            .then((result) => {
              setMessages((current) => {
                const updated = [...current];
                updated[assistantIndex] = {
                  ...updated[assistantIndex],
                  role: 'assistant',
                  content: result.content,
                  model: modelUsed,
                  promptTokens: result.promptTokens,
                  completionTokens: result.completionTokens,
                  durationMs: result.durationMs,
                };
                return updated;
              });
            })
            .catch((sendError) => {
              if (sendError.name === 'AbortError') {
                setError('Chat request was cancelled');
              } else {
                setMessages(nextMessages);
                setError(sendError instanceof Error ? sendError.message : String(sendError));
              }
            })
            .finally(() => setLoading(false));
        }

        function clearChat() {
          if (abortControllerRef.current) {
            abortControllerRef.current.abort();
            abortControllerRef.current = null;
          }
          setMessages([]);
          localStorage.removeItem(STORAGE_KEY_MESSAGES);
          setError(null);
          setInput('');
        }

        function onComposerKeyDown(event) {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
          }
        }

        return (
          <div className="flex min-h-0 flex-1 flex-col overflow-hidden">
            <div className="flex shrink-0 justify-end border-b border-slate-200 px-4 py-2 dark:border-slate-800">
              <div className="mx-auto flex w-full max-w-3xl justify-end">
                <button
                  type="button"
                  className="rounded-full border border-slate-200 px-3 py-1.5 text-sm font-semibold transition hover:border-blue-500 hover:text-blue-600 disabled:opacity-50 dark:border-slate-700"
                  disabled={loading}
                  onClick={clearChat}
                >
                  Clear chat
                </button>
              </div>
            </div>

            <div ref={messagesRef} className="flex-1 overflow-y-auto pb-40" aria-live="polite">
              {messages.length === 0 ? (
                <p className="flex min-h-full items-center justify-center p-8 text-center text-slate-500">
                  How can I help you today?
                </p>
              ) : (
                messages.map((message, index) => {
                  const isAssistant = message.role === 'assistant';
                  const isStreaming =
                    loading && isAssistant && index === messages.length - 1 && !message.content;
                  return (
                    <div
                      key={`${message.role}-${index}`}
                      className={`border-b border-slate-200/60 ${isAssistant ? 'bg-transparent' : 'bg-slate-100 dark:bg-slate-900'}`}
                    >
                      <div className="mx-auto max-w-3xl px-4 py-5 md:px-6">
                        {isAssistant ? (
                          isStreaming ? (
                            <p className="italic text-slate-500">Thinking…</p>
                          ) : (
                            <>
                              <MarkdownContent content={message.content} />
                              <MessageMetrics message={message} />
                            </>
                          )
                        ) : (
                          <div className="whitespace-pre-wrap break-words text-[0.95rem] leading-6">{message.content}</div>
                        )}
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            <div className="fixed bottom-0 left-0 right-0 z-50 bg-gradient-to-t from-slate-50 via-slate-50/95 to-transparent px-4 pb-4 pt-3 dark:from-slate-950 dark:via-slate-950/95">
              <div className="mx-auto flex max-w-3xl flex-col gap-2">
                {error ? (
                  <p className="rounded-xl border border-red-200 bg-red-50 px-3 py-2 text-sm font-semibold text-red-600 dark:border-red-900 dark:bg-red-950 dark:text-red-400">
                    {error}
                  </p>
                ) : null}
                <div className="flex items-end gap-2 rounded-2xl border border-slate-200 bg-white p-2 shadow-lg dark:border-slate-700 dark:bg-slate-900">
                  <textarea
                    ref={textareaRef}
                    className="min-h-[1.5rem] max-h-40 flex-1 resize-none border-0 bg-transparent px-2 py-1 text-sm outline-none"
                    value={input}
                    rows={1}
                    placeholder="Message the model…"
                    disabled={loading}
                    onChange={(event) => {
                      setInput(event.target.value);
                      resizeTextarea(event.target);
                    }}
                    onKeyDown={onComposerKeyDown}
                  />
                  {loading ? (
                    <button
                      type="button"
                      className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full border border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-900"
                      aria-label="Stop generating"
                      onClick={() => abortControllerRef.current?.abort()}
                    >
                      <span className="block h-3 w-3 rounded-sm bg-slate-700 dark:bg-slate-200" />
                    </button>
                  ) : (
                    <button
                      type="button"
                      className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-blue-600 text-white transition hover:opacity-90 disabled:opacity-40 dark:bg-emerald-600"
                      disabled={input.trim().length === 0}
                      aria-label="Send message"
                      onClick={() => void sendMessage()}
                    >
                      ↑
                    </button>
                  )}
                </div>
                <div className="flex flex-wrap items-center justify-between gap-2 px-1">
                  <label className="flex min-w-0 flex-1 items-center gap-2 text-sm">
                    <span className="text-xs font-semibold uppercase tracking-wide text-slate-500">Model</span>
                    {models.length > 0 ? (
                      <select
                        className="min-w-0 flex-1 rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm outline-none dark:border-slate-700 dark:bg-slate-900"
                        value={model}
                        disabled={loading || loadingModels}
                        onChange={(event) => setModel(event.target.value)}
                      >
                        {models.map((entry) => (
                          <option key={entry} value={entry}>
                            {entry}
                          </option>
                        ))}
                      </select>
                    ) : (
                      <input
                        className="min-w-0 flex-1 rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm outline-none dark:border-slate-700 dark:bg-slate-900"
                        type="text"
                        value={model}
                        placeholder="model-name"
                        disabled={loading}
                        onChange={(event) => setModel(event.target.value)}
                      />
                    )}
                  </label>
                  {loadingModels ? <span className="text-xs text-slate-500">Loading models…</span> : null}
                </div>
              </div>
            </div>
          </div>
        );
      }

      class ErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { hasError: false, error: null };
        }
        static getDerivedStateFromError(error) {
          return { hasError: true, error };
        }
        componentDidCatch(error, info) {
          console.error('ErrorBoundary caught:', error, info);
        }
        render() {
          if (this.state.hasError) {
            return (
              <div className="mx-auto max-w-3xl px-4 py-8">
                <div className="rounded-xl border border-red-200 bg-red-50 p-6 dark:border-red-900 dark:bg-red-950">
                  <h2 className="text-lg font-semibold text-red-600 dark:text-red-400">Something went wrong</h2>
                  {this.state.error && (
                    <p className="mt-2 text-slate-700 dark:text-slate-300">{String(this.state.error)}</p>
                  )}
                </div>
              </div>
            );
          }
          return this.props.children;
        }
      }

      function App() {
        const [tab, setTab] = useState(getTabFromUrl);
        const [dashboardLoading, setDashboardLoading] = useState(false);
        const refreshDashboardRef = useRef(null);

        useEffect(() => subscribeToRouteChanges(() => setTab(getTabFromUrl())), []);

        return (
          <div
            className={`flex min-h-screen w-full max-w-full flex-col ${tab === TAB_CHAT ? 'h-screen overflow-hidden' : 'min-w-0'}`}
          >
            <AppTopBar
              activeTab={tab}
              refreshing={dashboardLoading}
              onRefresh={
                tab === TAB_DASHBOARD
                  ? () => refreshDashboardRef.current?.()
                  : undefined
              }
            />
            {tab === TAB_DASHBOARD ? (
              <ErrorBoundary>
                <DashboardView
                  onLoadingChange={setDashboardLoading}
                  onReady={(api) => {
                    refreshDashboardRef.current = api.refresh;
                  }}
                />
              </ErrorBoundary>
            ) : (
              <ErrorBoundary>
                <ChatView />
              </ErrorBoundary>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
