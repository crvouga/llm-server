host:
  package_manager: apt
  required_binaries:
    - curl
    - rg
    - cloudflared
    - doppler
  lmstudio:
    install_method: appimage
    appimage_url: https://installers.lmstudio.ai/linux/x64/latest/LM-Studio.AppImage
    binary_path: ~/.local/bin/lmstudio

secrets:
  provider: doppler
  project: personal
  config: dev
  required_keys:
    - CLOUDFLARE_API_TOKEN
    - CLOUDFLARE_ACCOUNT_ID

models:
  manifest_path: spec/models.yaml

servers:
  lmstudio:
    enabled: true
    host: 127.0.0.1
    port: 1234
    model_id: qwen3-8b-instruct

services:
  use_systemd_user: true
  systemd_user_dir: ~/.config/systemd/user
  restart: always
  healthcheck_timeout_seconds: 30

exposure:
  cloudflare:
    enabled: true
    tunnel_name: local-llm
    tunnel_id_secret_key: CLOUDFLARE_TUNNEL_ID
    credentials_file_secret_key: CF_TUNNEL_CREDENTIALS_JSON
    config_path: ~/.cloudflared/local-llm.yml
    service_name: local-llm-cloudflared.service
    routes:
      - hostname: llm-api.local.example.com
        service: http://127.0.0.1:1234

safety:
  dry_run_default: true
  destroy_requires_confirmation: true
  cleanup_mode: managed_only

