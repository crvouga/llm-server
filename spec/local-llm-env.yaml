host:
  package_manager: apt
  required_binaries:
    - curl
    - rg
    - cloudflared
    - doppler
  lmstudio:
    install_method: appimage
    appimage_url: https://installers.lmstudio.ai/linux/x64/latest/LM-Studio.AppImage
    binary_path: ~/.lmstudio/bin/lms

secrets:
  provider: doppler
  project: personal
  config: dev
  required_keys:
    - CLOUDFLARE_API_TOKEN
    - CLOUDFLARE_ACCOUNT_ID

services:
  use_systemd_user: true
  systemd_user_dir: ~/.config/systemd/user
  restart: always
  healthcheck_timeout_seconds: 30

exposure:
  cloudflare:
    enabled: true
    tunnel_name: lm-studio
    tunnel_id_secret_key: CLOUDFLARE_TUNNEL_ID
    credentials_file_secret_key: CF_TUNNEL_CREDENTIALS_JSON
    config_path: ~/.cloudflared/lm-studio.yml
    service_name: lm-studio-cloudflared.service
    routes:
      - hostname: lm-studio.chrisvouga.dev
        service: http://127.0.0.1:1234

safety:
  dry_run_default: true
  destroy_requires_confirmation: true
  cleanup_mode: managed_only

