host:
  package_manager: apt
  required_binaries:
    - curl
    - rg
    - cloudflared
    - huggingface-cli
    - doppler
  lmstudio:
    install_method: appimage
    appimage_url: https://installers.lmstudio.ai/linux/x64/latest/LM-Studio.AppImage
    binary_path: ~/.local/bin/lmstudio
  llamacpp:
    install_method: github_release
    binary_url: https://github.com/ggerganov/llama.cpp/releases/latest/download/llama-server
    binary_path: ~/.local/bin/llama-server

secrets:
  provider: doppler
  project: local-llm
  config: dev
  required_keys:
    - CF_API_TOKEN
    - CF_ACCOUNT_ID
    - CF_ZONE_ID
    - CF_TUNNEL_ID

models:
  manifest_path: spec/models.yaml
  download_dir: ~/.local/share/local-llm-models
  prune_unmanaged: true

servers:
  lmstudio:
    enabled: true
    host: 127.0.0.1
    port: 1234
    model_id: qwen3-8b-instruct
  llamacpp:
    enabled: true
    host: 127.0.0.1
    port: 8080
    model_path: ~/.local/share/local-llm-models/qwen3-8b-instruct-q4_k_m.gguf
    extra_args:
      - --ctx-size
      - "8192"
      - --n-gpu-layers
      - "99"

services:
  use_systemd_user: true
  systemd_user_dir: ~/.config/systemd/user
  restart: always
  healthcheck_timeout_seconds: 30

exposure:
  cloudflare:
    enabled: true
    tunnel_name: local-llm
    tunnel_id_secret_key: CF_TUNNEL_ID
    credentials_file_secret_key: CF_TUNNEL_CREDENTIALS_JSON
    config_path: ~/.cloudflared/local-llm.yml
    service_name: local-llm-cloudflared.service
    routes:
      - hostname: llm-api.local.example.com
        service: http://127.0.0.1:1234
      - hostname: llm-raw.local.example.com
        service: http://127.0.0.1:8080

safety:
  dry_run_default: true
  destroy_requires_confirmation: true
  cleanup_mode: managed_only

