# Fly.io app for self-hosted LiteLLM proxy at litellm.chrisvouga.dev
app = "litellm-chrisvouga"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[[deploy]]
  strategy = "rolling"
  max_unavailable = 1
  min_ready_seconds = 30
  health_check_timeout = 60
  restart_delay_timeout = 30
  max_refresh_retries = 10

[env]
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
