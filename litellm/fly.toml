# Fly.io app for self-hosted LiteLLM proxy at litellm.chrisvouga.dev
app = "litellm-chrisvouga"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"
  max_unavailable = 1
  # LiteLLM runs `prisma migrate deploy` on boot, so a cold machine can take well over
  # a minute to start + pass `/health/liveliness`. Extend the deploy wait past the
  # default 5m so the rolling update doesn't cancel mid-boot and roll back to a stale
  # config. `wait_timeout` is the only fly.toml key that controls this.
  wait_timeout = "10m"

[env]
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    # Fly caps the HTTP-check grace period at 60s; the longer boot + prisma migrate
    # window is covered by [deploy] wait_timeout, not here.
    grace_period = "60s"
    method = "GET"
    # MUST be an unauthenticated endpoint. `/health` requires the master key and returns
    # 401 to the probe -> never healthy -> rolling update times out. `/health/liveliness`
    # and `/health/readiness` are the only unauthenticated probes LiteLLM exposes.
    path = "/health/liveliness"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
