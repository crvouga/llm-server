# Fly.io app for self-hosted LiteLLM proxy at litellm.chrisvouga.dev
app = "litellm-chrisvouga"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[[deploy]]
  strategy = "rolling"
  max_unavailable = 1
  min_ready_seconds = 30
  # litellm-database runs `prisma migrate deploy` on boot; give it headroom so the
  # rolling health check doesn't time out (and roll back to a stale config) mid-migration.
  health_check_timeout = 120
  restart_delay_timeout = 30
  max_refresh_retries = 10

[env]
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    # Boot + prisma migrate can take >60s on a cold machine; don't fail the probe early.
    grace_period = "120s"
    method = "GET"
    # MUST be an unauthenticated endpoint. `/health` requires the master key and returns
    # 401 to the probe -> never healthy -> rolling update times out. `/health/liveliness`
    # and `/health/readiness` are the only unauthenticated probes LiteLLM exposes.
    path = "/health/liveliness"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
