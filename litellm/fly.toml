# Fly.io app for self-hosted LiteLLM proxy at litellm.chrisvouga.dev
app = "litellm-chrisvouga"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health/liveliness"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
