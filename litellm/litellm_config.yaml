# LiteLLM proxy configuration for litellm.chrisvouga.dev
# Provider API keys are injected via Doppler/Fly secrets (os.environ/*).

model_list:
  - model_name: "*"
    litellm_params:
      model: openai/*
      api_base: https://lm-studio.chrisvouga.dev/v1
      api_key: os.environ/LITELLM_LM_STUDIO_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_connection_pool_limit: 10
  database_extra_connection_params:
    pgbouncer: "true"
    statement_cache_size: 0
